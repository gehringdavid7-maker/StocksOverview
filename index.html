<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0D0D0D;
    font-family:Arial, Helvetica, sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;
}

.dashboard{
    width:90vw;
    max-width:1400px;
    height:75vh;

    display:grid;

    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(2,1fr);

    gap:32px;
}

.widget{
    background:#3B3A3A;

    border-radius:18px;

    box-shadow:
        0 0 15px rgba(255,255,255,.03);

    transition:.2s;
}

.widget:hover{
    transform:translateY(-3px);

    box-shadow:
        0 8px 25px rgba(0,0,0,.45);
}
</style>

</head>
<body>

<div class="dashboard">

    <div class="widget"></div>
    <div class="widget"></div>
    <div class="widget"></div>

    <div class="widget"></div>
    <div class="widget"></div>
    <div class="widget"></div>

</div>

</body>
</html>
