<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Overview</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0D0D0D; font-family:Arial, sans-serif; color:white; }
        h1 { text-align:center; margin:35px 0; font-size:42px; font-weight:600; }
        .container { width:99vw; display:flex; justify-content:center; align-items:center; gap:90px; }
        .dashboard { width:1200px; height:75vh; display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(2,1fr); gap:32px; }
        
        .widget { background:#3B3A3A; border-radius:18px; padding:20px; display:flex; flex-direction:column; }
        .widget-title { text-align:center; font-size:20px; font-weight:600; margin-bottom:15px; width: 100%; }
        
        /* Die Chart-Container im Index-Widget */
        .tv-wrapper { margin-bottom: 10px; cursor: pointer; border-radius: 12px; overflow: hidden; }
        .side-widget { width:378px; height:75vh; background:#3B3A3A; border-radius:18px; }
    </style>
</head>
<body>

<h1>Stock Overview</h1>

<div class="container">
    <div class="side-widget"></div>

    <div class="dashboard">
        <div class="widget" id="indexWidget">
            <div class="widget-title">Index</div>
            
            <div class="tv-wrapper" onclick="window.open('https://www.tradingview.com/symbols/SPX/', '_blank')">
                <div class="tradingview-widget-container"><div id="tradingview_spx"></div></div>
            </div>
            <div class="tv-wrapper" onclick="window.open('https://de.tradingview.com/symbols/LSE-SWDA/', '_blank')">
                <div class="tradingview-widget-container"><div id="tradingview_msci"></div></div>
            </div>
            <div class="tv-wrapper" onclick="window.open('https://de.tradingview.com/symbols/NASDAQ-QQQ/', '_blank')">
                <div class="tradingview-widget-container"><div id="tradingview_nasdaq"></div></div>
            </div>
        </div>

        <div class="widget"><div class="widget-title">Precious Metals</div></div>
        <div class="widget"><div class="widget-title">Empty</div></div>
        <div class="widget"><div class="widget-title">Currencies</div></div>
        <div class="widget"><div class="widget-title">Empty</div></div>
        <div class="widget"><div class="widget-title">Empty</div></div>
    </div>

    <div class="side-widget"></div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script type="text/javascript">
    function createWidget(containerId, symbol) {
        new TradingView.widget({
            "container_id": containerId,
            "width": "100%",
            "height": 120,
            "symbol": symbol,
            "interval": "D",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "2",
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_top_toolbar": true,
            "hide_legend": true,
            "save_image": false,
            "backgroundColor": "#000000"
        });
    }

    createWidget("tradingview_spx", "SP:SPX");
    createWidget("tradingview_msci", "LSE:SWDA");
    createWidget("tradingview_nasdaq", "NASDAQ:QQQ");
</script>

</body>
</html>
