<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stock Overview</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0D0D0D;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
}

h1{
    text-align:center;
    margin-top:35px;
    margin-bottom:35px;
    font-size:42px;
    font-weight:600;
}

.container{
    width:99vw;
    margin:auto;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:90px;
}

.dashboard{
    width:1200px;
    height:75vh;

    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(2,1fr);

    gap:32px;
}

.widget,
.side-widget{
    background:#3B3A3A;
    border-radius:18px;
    box-shadow:0 0 15px rgba(255,255,255,.03);
    transition:.2s;
}

.widget{
    padding:20px;
}

.widget-title{
    color:white;
    font-size:20px;
    font-weight:600;
    margin-bottom:15px;
}

.widget:hover,
.side-widget:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 25px rgba(0,0,0,.45);
}

/* Side panels */
.side-widget{
    width:378px;
    height:75vh;
}

</style>

</head>

<body>

<h1>Stock Overview</h1>

<div class="container">

    <div class="side-widget"></div>

    <div class="dashboard">

        <!-- Top Left -->
        <div class="widget">
            <div class="widget-title">Index</div>
        </div>

        <!-- Top Middle -->
        <div class="widget">
            <div class="widget-title">Precious Metals</div>
        </div>

        <!-- Top Right -->
        <div class="widget">
            <div class="widget-title"></div>
        </div>

        <!-- Bottom Left -->
        <div class="widget">
            <div class="widget-title">Currencies</div>
        </div>

        <!-- Bottom Middle -->
        <div class="widget">
            <div class="widget-title"></div>
        </div>

        <!-- Bottom Right -->
        <div class="widget">
            <div class="widget-title"></div>
        </div>

    </div>

    <div class="side-widget"></div>

</div>

</body>
</html>
