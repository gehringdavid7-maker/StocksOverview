<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Overview</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0D0D0D; font-family:Arial, sans-serif; color:white; }
        h1 { text-align:center; margin:35px 0; font-size:42px; font-weight:600; }
        .container { width:99vw; display:flex; justify-content:center; gap:32px; }
        .dashboard { width:800px; display:grid; grid-template-columns:repeat(3, 1fr); gap:20px; }
        .widget { background:#3B3A3A; border-radius:18px; padding:20px; min-height: 150px; }
        .widget-title { text-align:center; font-size:18px; font-weight:600; margin-bottom:15px; }
        .index-item { background:#000; border-radius:12px; padding:10px; margin-bottom:10px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
        .name { font-size:13px; font-weight:600; }
        .price { font-size:12px; opacity:0.8; }
        .change { font-size:13px; font-weight:600; }
    </style>
</head>
<body>

<h1>Stock Overview</h1>

<div class="container">
    <div class="dashboard">
        <div class="widget" id="indexWidget">
            <div class="widget-title">Live Indizes</div>
        </div>
    </div>
</div>

<script>
const indices = [
    { name: "S&P 500", symbol: "SPY", tv: "https://www.tradingview.com/symbols/SPX/" },
    { name: "Nasdaq", symbol: "QQQ", tv: "https://de.tradingview.com/symbols/NASDAQ-QQQ/" },
    { name: "Gold", symbol: "GLD", tv: "https://de.tradingview.com/symbols/TVC-GOLD/" }
];

// Wir nutzen einen Proxy, um CORS-Fehler zu vermeiden
async function fetchData(symbol) {
    const url = `https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/' + symbol)}`;
    const response = await fetch(url);
    const data = await response.json();
    const result = JSON.parse(data.contents).chart.result[0].meta;
    
    return {
        price: result.regularMarketPrice,
        open: result.chartPreviousClose
    };
}

async function loadIndex() {
    const container = document.getElementById("indexWidget");
    container.innerHTML = `<div class="widget-title">Live Indizes</div>`;

    for (const item of indices) {
        try {
            const data = await fetchData(item.symbol);
            const change = (((data.price - data.open) / data.open) * 100).toFixed(2);
            const color = change >= 0 ? "lime" : "red";

            const div = document.createElement("div");
            div.className = "index-item";
            div.onclick = () => window.open(item.tv, "_blank");
            div.innerHTML = `
                <div>
                    <div class="name">${item.name}</div>
                    <div class="price">$${data.price.toFixed(2)}</div>
                </div>
                <div class="change" style="color:${color}">${change > 0 ? '+':''}${change}%</div>
            `;
            container.appendChild(div);
        } catch (e) {
            console.error("Fehler bei", item.symbol, e);
        }
    }
}

// Initialer Aufruf
loadIndex();
// Update alle 60 Sekunden (API-Limits beachten!)
setInterval(loadIndex, 60000);
</script>

</body>
</html>
