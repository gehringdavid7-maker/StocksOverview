<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stock Overview</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0D0D0D;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
}

h1{
    text-align:center;
    margin-top:35px;
    margin-bottom:35px;
    font-size:42px;
    font-weight:600;
}

.container{
    width:95vw;
    max-width:1800px;
    margin:auto;

    display:flex;
    justify-content:center;
    gap:45px;
}

.side-widget{
    width:180px;
    height:75vh;

    background:#3B3A3A;
    border-radius:18px;

    box-shadow:0 0 15px rgba(255,255,255,.03);

    transition:.2s;
}

.dashboard{
    flex:1;
    max-width:1300px;
    height:75vh;

    display:grid;

    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(2,1fr);

    gap:32px;
}

.widget{
    background:#3B3A3A;
    border-radius:18px;

    box-shadow:0 0 15px rgba(255,255,255,.03);

    transition:.2s;
}

.widget:hover,
.side-widget:hover{
    transform:translateY(-3px);

    box-shadow:0 8px 25px rgba(0,0,0,.45);
}

</style>
</head>

<body>

<h1>Stock Overview</h1>

<div class="container">

    <div class="side-widget"></div>

    <div class="dashboard">

        <div class="widget"></div>
        <div class="widget"></div>
        <div class="widget"></div>

        <div class="widget"></div>
        <div class="widget"></div>
        <div class="widget"></div>

    </div>

    <div class="side-widget"></div>

</div>

</body>
</html>
