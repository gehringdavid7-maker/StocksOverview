<script>
const indices = [
    { name: "S&P 500", symbol: "^GSPC", tv: "https://www.tradingview.com/symbols/SPX/" },
    { name: "MSCI World", symbol: "VT", tv: "https://de.tradingview.com/symbols/LSE-SWDA/" },
    { name: "Nasdaq 100", symbol: "QQQ", tv: "https://de.tradingview.com/symbols/NASDAQ-QQQ/" }
];

function initWidgets() {
    const container = document.getElementById("indexWidget");
    indices.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "index-item";
        div.id = `index-${index}`;
        div.onclick = () => window.open(item.tv, "_blank");
        div.innerHTML = `
            <div>
                <div class="name">${item.name}</div>
                <div class="price" id="price-${index}">Lädt...</div>
            </div>
            <div class="change" id="change-${index}">--</div>
        `;
        container.appendChild(div);
    });
}

// Hilfsfunktion für eine kurze Pause zwischen den Anfragen
const delay = (ms) => new Promise(res => setTimeout(res, ms));

async function updateValues() {
    for (let i = 0; i < indices.length; i++) {
        await delay(1000); // 1 Sekunde Pause pro Anfrage für Stabilität
        
        try {
            const url = `https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/' + indices[i].symbol)}`;
            const response = await fetch(url);
            const data = await response.json();
            
            if (!data.contents) throw new Error("Keine Daten");
            
            const meta = JSON.parse(data.contents).chart.result[0].meta;
            const price = meta.regularMarketPrice.toFixed(2);
            const change = (((meta.regularMarketPrice - meta.chartPreviousClose) / meta.chartPreviousClose) * 100).toFixed(2);
            
            document.getElementById(`price-${i}`).innerText = `$${price}`;
            const changeEl = document.getElementById(`change-${i}`);
            changeEl.innerText = `${change > 0 ? '+' : ''}${change}%`;
            changeEl.style.color = change >= 0 ? "lime" : "red";
        } catch (e) {
            console.error("Fehler bei " + indices[i].name, e);
            document.getElementById(`price-${i}`).innerText = "Fehler";
            document.getElementById(`change-${i}`).innerText = "--";
        }
    }
}

initWidgets();
updateValues();
setInterval(updateValues, 60000); // Auf 60 Sek erhöht, um Proxy-Blockaden zu vermeiden
</script>
